<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>picture</title>
        <style>
            *{
                margin: 0;
                padding: 0;
            }
            ul{
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                height: 30px;
                margin-top: 10px;
                gap: 20px;
                background-color: rgba(208, 204, 204, 0.413);
                border-top: 3px orange solid;
                border-bottom: 1px gray solid;
            }
            li{
                list-style: none;
                display: inline-flex;
                
                
            }
            a{
                color: rgb(74, 69, 69);
                cursor: pointer;
            }
            li a:hover{
                color: orange;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <nav>
            <ul>
                <li><a>312</a></li>
                <li><a>312</a></li>
                <li><a>312</a></li>
                <li><a>312</a></li>
            </ul>
        </nav>
    </body>
</html>
